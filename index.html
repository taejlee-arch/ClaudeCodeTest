<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    h1 { font-size: 2rem; letter-spacing: 4px; color: #e94560; }

    #status {
      font-size: 1.2rem;
      min-height: 1.5em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) { background: #0f3460; transform: scale(1.05); }
    .cell.taken { cursor: default; }
    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }
    .cell.win { background: #0f3460; box-shadow: 0 0 16px #e9456066; }

    #reset {
      padding: 10px 32px;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #reset:hover { background: #c73652; }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>
  <div id="status">Player X's turn</div>
  <div id="board"></div>
  <button id="reset">Restart</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over;

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      over = false;
      render();
      setStatus("Player X's turn");
    }

    function render() {
      const el = document.getElementById('board');
      el.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ` taken ${val.toLowerCase()}` : '');
        cell.textContent = val || '';
        cell.addEventListener('click', () => move(i));
        el.appendChild(cell);
      });
    }

    function highlight(combo) {
      const cells = document.querySelectorAll('.cell');
      combo.forEach(i => cells[i].classList.add('win'));
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function move(i) {
      if (over || board[i]) return;
      board[i] = current;
      render();

      const win = WINS.find(combo => combo.every(j => board[j] === current));
      if (win) {
        highlight(win);
        setStatus(`Player ${current} wins!`);
        over = true;
        return;
      }
      if (board.every(Boolean)) {
        setStatus("It's a draw!");
        over = true;
        return;
      }
      current = current === 'X' ? 'O' : 'X';
      setStatus(`Player ${current}'s turn`);
    }

    document.getElementById('reset').addEventListener('click', init);
    init();
  </script>
</body>
</html>
